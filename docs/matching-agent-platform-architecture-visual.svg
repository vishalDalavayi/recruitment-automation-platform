<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1840" height="760" viewBox="0 0 1840 760" role="img">
  <title>Platform architecture visual</title>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#456"/></marker>
    <marker id="ahd" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#789"/></marker>
    <style>
      .bg { fill: #e8eef6; }
      .lane { rx: 14; ry: 14; stroke-width: 2; }
      .t { font-family: Arial, Helvetica, sans-serif; fill: #0f2336; }
      .h { font: 700 22px Arial, Helvetica, sans-serif; }
      .l { font: 700 15px Arial, Helvetica, sans-serif; }
      .s { font: 13px Arial, Helvetica, sans-serif; fill: #334e68; }
      .m { font: 11px Menlo, monospace; fill: #1a5080; }
      .arr { stroke: #345; stroke-width: 2.8; fill: none; marker-end: url(#ah); }
      .arrd { stroke: #678; stroke-width: 2.5; fill: none; stroke-dasharray: 10 8; marker-end: url(#ahd); }
    </style>
  </defs>
  <rect class="bg" width="1840" height="760"/>
  <text class="t h" x="40" y="46">Visual: Full platform layers</text>
  <text class="t s" x="40" y="74">Companion to matching-agent-platform-architecture.svg - swimlanes show data vs integration vs matcher vs batch.</text>

  <!-- Legend -->
  <rect fill="#ecfdf5" stroke="#5cb878" class="lane" x="1420" y="28" width="380" height="76"/>
  <text class="t l" x="1440" y="54">Legend</text>
  <rect fill="#ecfdf5" stroke="#5cb878" x="1440" y="62" width="14" height="14" rx="3"/><text class="t s" x="1462" y="74">Existing repo</text>
  <rect fill="#e8f1ff" stroke="#5b8fd9" x="1590" y="62" width="14" height="14" rx="3"/><text class="t s" x="1612" y="74">New integration</text>
  <rect fill="#fff8ec" stroke="#d9a441" x="1440" y="78" width="14" height="14" rx="3"/><text class="t s" x="1462" y="90">Batch / scheduler</text>

  <!-- Lane 1 existing -->
  <rect fill="#ecfdf5" stroke="#5cb878" class="lane" x="40" y="108" width="1760" height="132"/>
  <text class="t l" x="60" y="138">Layer 1 - Baseline data (already in repo)</text>
  <rect fill="#fff" stroke="#8cba94" rx="10" ry="10" x="80" y="158" width="200" height="64"/><text class="t l" x="110" y="188">Scraper</text><text class="t m" x="98" y="208">services/scraper/</text>
  <line class="arr" x1="280" y1="190" x2="340" y2="190"/>
  <rect fill="#fff" stroke="#8cba94" rx="10" ry="10" x="340" y="158" width="220" height="64"/><text class="t l" x="370" y="188">Postgres jobs</text><text class="t m" x="358" y="208">active + inactive tables</text>
  <rect fill="#fff" stroke="#8cba94" rx="10" ry="10" x="620" y="158" width="240" height="64"/><text class="t l" x="645" y="188">Resume formatter</text><text class="t m" x="638" y="208">resume_formatter/</text>
  <line class="arr" x1="860" y1="190" x2="920" y2="190"/>
  <rect fill="#fff" stroke="#8cba94" rx="10" ry="10" x="920" y="158" width="260" height="64"/><text class="t l" x="955" y="188">Candidates table</text><text class="t m" x="938" y="208">formatted_resume_*</text>

  <!-- Lane 2 FastAPI -->
  <rect fill="#e8f1ff" stroke="#5b8fd9" class="lane" x="40" y="258" width="1760" height="132"/>
  <text class="t l" x="60" y="288">Layer 2 - Python bridge</text>
  <rect fill="#fff" stroke="#6b93d6" rx="10" ry="10" x="80" y="308" width="220" height="64"/><text class="t l" x="115" y="338">FastAPI</text><text class="t m" x="98" y="358">routers/candidates.py</text>
  <line class="arr" x1="300" y1="340" x2="360" y2="340"/>
  <rect fill="#fff" stroke="#6b93d6" rx="10" ry="10" x="360" y="308" width="280" height="64"/><text class="t l" x="395" y="338">matching_integration</text><text class="t m" x="378" y="358">SQL + resume text + HTTP</text>
  <line class="arrd" x1="640" y1="340" x2="760" y2="340"/>
  <text class="t m" x="652" y="330">MATCHER_SERVICE_URL</text>
  <rect fill="#ede8ff" stroke="#8b6ccf" rx="10" ry="10" x="760" y="308" width="200" height="64"/><text class="t l" x="795" y="338">Node :5051</text><text class="t m" x="782" y="358">POST /match/jobs</text>
  <line class="arrd" x1="960" y1="340" x2="1040" y2="340"/>
  <rect fill="#fff" stroke="#6b93d6" rx="10" ry="10" x="1040" y="308" width="320" height="64"/><text class="t l" x="1075" y="338">Read stored matches</text><text class="t m" x="1062" y="358">candidate_match_* tables</text>

  <!-- Lane 3 Node matcher -->
  <rect fill="#f7f5ff" stroke="#9b87d4" class="lane" x="40" y="408" width="1760" height="152"/>
  <text class="t l" x="60" y="438">Layer 3 - Matcher service (Node + subprocess)</text>
  <rect fill="#fff" stroke="#9b87d4" rx="10" ry="10" x="80" y="458" width="160" height="84"/><text class="t l" x="115" y="492">server.js</text><text class="t m" x="94" y="514">HTTP API</text>
  <line class="arr" x1="240" y1="500" x2="300" y2="500"/>
  <rect fill="#fff" stroke="#9b87d4" rx="10" ry="10" x="300" y="458" width="200" height="84"/><text class="t l" x="335" y="492">matchingAgent</text><text class="t m" x="322" y="514">rank + ATS merge</text>
  <line class="arr" x1="500" y1="500" x2="560" y2="500"/>
  <rect fill="#fff" stroke="#9b87d4" rx="10" ry="10" x="560" y="458" width="240" height="84"/><text class="t l" x="595" y="488">vector_rank_jobs.py</text><text class="t m" x="578" y="510">stdin JSON process</text>
  <line class="arr" x1="800" y1="500" x2="870" y2="500"/>
  <ellipse fill="#e8fdf0" stroke="#5cb878" cx="970" cy="500" rx="90" ry="44"/><text class="t l" x="918" y="495">pgvector</text><text class="t m" x="918" y="512">embeddings DB</text>
  <line class="arr" x1="1060" y1="500" x2="1140" y2="500"/>
  <rect fill="#fff" stroke="#9b87d4" rx="10" ry="10" x="1140" y="458" width="180" height="84"/><text class="t l" x="1175" y="492">persist</text><text class="t m" x="1162" y="514">postgres.js</text>
  <line class="arr" x1="1320" y1="500" x2="1390" y2="500"/>
  <rect fill="#fff" stroke="#c9952e" rx="10" ry="10" x="1390" y="458" width="180" height="84"/><text class="t l" x="1425" y="492">Tailoring</text><text class="t m" x="1412" y="514">optional HTTP</text>

  <!-- Lane 4 batch -->
  <rect fill="#fff8ec" stroke="#d9a441" class="lane" x="40" y="578" width="1760" height="142"/>
  <text class="t l" x="60" y="608">Layer 4 - Scheduled bulk</text>
  <rect fill="#fff" stroke="#d9a441" rx="10" ry="10" x="80" y="628" width="200" height="72"/><text class="t l" x="115" y="658">Scheduler</text><text class="t m" x="98" y="678">service.py / cli</text>
  <line class="arr" x1="280" y1="664" x2="340" y2="664"/>
  <rect fill="#fff" stroke="#d9a441" rx="10" ry="10" x="340" y="628" width="260" height="72"/><text class="t l" x="375" y="658">matching_automation</text><text class="t m" x="362" y="678">spawn node batch</text>
  <line class="arr" x1="600" y1="664" x2="680" y2="664"/>
  <rect fill="#fff" stroke="#d9a441" rx="10" ry="10" x="680" y="628" width="320" height="72"/><text class="t l" x="715" y="658">run-daily-match-batch</text><text class="t m" x="702" y="678">run-db-match-caller.js</text>
  <line class="arrd" x1="1000" y1="664" x2="1140" y2="664"/>
  <text class="t m" x="1048" y="654">same matcher URL</text>
  <rect fill="#ede8ff" stroke="#8b6ccf" rx="10" ry="10" x="1140" y="628" width="160" height="72"/><text class="t l" x="1175" y="668">Node</text>

  <text class="t m" x="40" y="742">Detailed text + file paths: matching-agent-platform-architecture.svg</text>
</svg>
